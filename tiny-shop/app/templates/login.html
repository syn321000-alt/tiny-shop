{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>로그인</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form class="stacked" method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token', '') }}">
        <label>아이디</label>
        <input type="text" name="username" required>
        <label>비밀번호</label>
        <input type="password" name="password" required>
        <div style="margin-top:16px"><button type="submit">로그인</button></div>
    </form>
</div>
{% endblock %}
