{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>송금하기</h2>
    <p>내 잔액: {{ "{:,.0f}".format(user.balance) }}원</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form class="stacked" method="post" action="/transfer">
        <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token', '') }}">
        <label>받는 사람 아이디</label>
        <input type="text" name="receiver_username" required>
        <label>금액</label>
        <input type="number" name="amount" required min="1" step="1">
        <div style="margin-top:16px"><button type="submit">송금</button></div>
    </form>
</div>
{% endblock %}
